<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WeeklyShot - 体重記録</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f9fafb; color: #374151; }
.container { max-width: 28rem; margin: 0 auto; padding: 1rem; }
h1 { text-align: center; font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: .25rem; }
.sub { text-align: center; font-size: .875rem; color: #6b7280; margin-bottom: 1.5rem; }
.name { text-align: center; font-size: .875rem; color: #6b7280; margin-bottom: .25rem; }
.label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .5rem; }
.section { margin-bottom: 1.25rem; }
input[type="number"] { width: 100%; padding: .75rem; border: 1px solid #e5e7eb; border-radius: .5rem; background: #fff; font-size: 1.125rem; -webkit-appearance: none; }
input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.input-group { display: flex; align-items: center; gap: .5rem; }
.input-group input { flex: 1; }
.unit { font-size: 1rem; color: #6b7280; font-weight: 500; }
.submit { width: 100%; padding: 1rem; background: #2563eb; color: #fff; font-weight: bold; font-size: 1.125rem; border: none; border-radius: .75rem; cursor: pointer; margin-top: .5rem; }
.submit:disabled { opacity: .5; }
.submit:hover:not(:disabled) { background: #1d4ed8; }
.error { background: #fef2f2; border: 1px solid #fecaca; border-radius: .5rem; padding: .75rem; font-size: .875rem; color: #dc2626; margin-bottom: 1rem; }
.success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: .5rem; padding: .75rem; font-size: .875rem; color: #16a34a; margin-bottom: 1rem; text-align: center; }
.loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #6b7280; }
.hidden { display: none; }

/* 変化量カード */
.change-card { background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem; padding: 1rem; margin-bottom: 1.25rem; text-align: center; }
.change-value { font-size: 1.75rem; font-weight: bold; }
.change-value.loss { color: #2563eb; }
.change-value.gain { color: #ef4444; }
.change-value.neutral { color: #6b7280; }
.change-sub { font-size: .75rem; color: #9ca3af; margin-top: .25rem; }

/* グラフ */
.chart-container { background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem; padding: 1rem; margin-bottom: 1.25rem; }
.chart-toggle { display: flex; gap: .5rem; margin-bottom: .75rem; }
.chart-toggle button { flex: 1; padding: .5rem; border: 1px solid #e5e7eb; border-radius: .5rem; background: #fff; font-size: .75rem; font-weight: 500; color: #6b7280; cursor: pointer; }
.chart-toggle button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.no-data { text-align: center; color: #9ca3af; font-size: .875rem; padding: 2rem 0; }

/* 履歴 */
.history { margin-bottom: 1.25rem; }
.history-title { font-size: .875rem; font-weight: 600; color: #374151; margin-bottom: .5rem; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0; border-bottom: 1px solid #f3f4f6; font-size: .875rem; }
.history-date { color: #6b7280; }
.history-weight { font-weight: 600; }
.history-fat { font-size: .75rem; color: #9ca3af; margin-left: .5rem; }

/* Profile card */
.profile-card { background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem; padding: 1.25rem; margin: 1.5rem 0 1rem; text-align: left; }
.profile-header { display: flex; flex-direction: column; gap: .15rem; margin-bottom: .75rem; }
.profile-badge { font-size: .65rem; color: #2563eb; background: #eff6ff; padding: .15rem .5rem; border-radius: 1rem; width: fit-content; font-weight: 600; }
.profile-header strong { font-size: 1rem; }
.profile-desc { font-size: .75rem; color: #6b7280; }
.profile-links { display: flex; flex-direction: column; gap: .5rem; }
.profile-link { display: flex; align-items: center; gap: .5rem; padding: .6rem .75rem; background: #f9fafb; border: 1px solid #f3f4f6; border-radius: .5rem; text-decoration: none; color: #374151; font-size: .875rem; font-weight: 500; transition: background .15s; }
.profile-link:hover { background: #f3f4f6; }
.link-icon { font-size: 1rem; width: 1.5rem; text-align: center; }
.link-sub { margin-left: auto; font-size: .7rem; color: #9ca3af; font-weight: 400; }
.note { text-align: center; font-size: .75rem; color: #9ca3af; margin-top: 1rem; }
</style>
</head>
<body>

<div id="loading" class="loading">読み込み中...</div>

<div id="error-view" class="hidden" style="display:none;">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;text-align:center;">
    <p id="error-msg" class="error"></p>
    <p style="font-size:.75rem;color:#9ca3af;">LINEアプリ内からこのページを開いてください。</p>
  </div>
</div>

<div id="main-view" class="hidden" style="display:none;">
  <div class="container">
    <h1>体重記録</h1>
    <p id="user-name" class="name hidden"></p>
    <p class="sub">毎日の記録が、変化を見える化します</p>
    <div id="api-error" class="error hidden"></div>
    <div id="api-success" class="success hidden"></div>

    <!-- 変化量カード -->
    <div id="change-card" class="change-card hidden">
      <div id="change-value" class="change-value neutral">±0.0kg</div>
      <div id="change-sub" class="change-sub"></div>
    </div>

    <!-- グラフ -->
    <div id="chart-section" class="chart-container hidden">
      <div class="chart-toggle">
        <button id="btn-30d" class="active" onclick="setRange('30d')">30日</button>
        <button id="btn-all" onclick="setRange('all')">全期間</button>
      </div>
      <canvas id="weight-chart" height="200"></canvas>
    </div>

    <!-- 入力フォーム -->
    <div class="section">
      <span class="label">今日の体重</span>
      <div class="input-group">
        <input type="number" id="weight-input" step="0.1" min="20" max="300" placeholder="65.0" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </div>

    <div class="section">
      <span class="label">体脂肪率（任意）</span>
      <div class="input-group">
        <input type="number" id="fat-input" step="0.1" min="1" max="70" placeholder="25.0" inputmode="decimal">
        <span class="unit">%</span>
      </div>
    </div>

    <button class="submit" id="submit-btn" onclick="handleSubmit()">記録する</button>

    <!-- 直近の履歴 -->
    <div id="history-section" class="history hidden" style="margin-top:1.25rem;">
      <div class="history-title">直近の記録</div>
      <div id="history-list"></div>
    </div>

    <!-- Profile -->
    <div class="profile-card">
      <div class="profile-header">
        <span class="profile-badge">開発者</span>
        <strong>Dr.いわたつ</strong>
        <span class="profile-desc">糖尿病・内分泌専門医 / 医療×AI×実装</span>
      </div>
      <div class="profile-links">
        <a href="https://driwatatsu.readdy.co" class="profile-link" target="_blank">
          <span class="link-icon">🏠</span>HP<span class="link-sub">プロフィール・実績</span>
        </a>
        <a href="https://note.com/dr_iwatatsu" class="profile-link" target="_blank">
          <span class="link-icon">📖</span>note<span class="link-sub">GLP-1の副作用対策など</span>
        </a>
        <a href="https://x.com/KenKyu1019799" class="profile-link" target="_blank">
          <span class="link-icon">𝕏</span>X<span class="link-sub">医療AIの最新情報</span>
        </a>
        <a href="https://www.instagram.com/dr.iwatatsu/" class="profile-link" target="_blank">
          <span class="link-icon">📸</span>Instagram<span class="link-sub">ライフスタイル</span>
        </a>
        <a href="https://medapp-market.vercel.app/" class="profile-link" target="_blank">
          <span class="link-icon">💊</span>MedApp Market<span class="link-sub">医療アプリまとめ</span>
        </a>
      </div>
    </div>

    <p class="note">※ 体重は目安です。治療方針は必ず主治医にご相談ください</p>
  </div>
</div>

<script>
var LIFF_ID = "2010011578-db7AxPzc";
var state = { userId: null, displayName: null, logs: [] };
var chart = null;
var currentRange = "30d";

function show(id) {
  ["loading","error-view","main-view"].forEach(function(v) {
    var el = document.getElementById(v);
    el.style.display = "none";
    el.classList.add("hidden");
  });
  var target = document.getElementById(id);
  target.style.display = "";
  target.classList.remove("hidden");
}

function showError(msg) {
  document.getElementById("error-msg").textContent = msg;
  show("error-view");
}

// LIFF初期化
liff.init({ liffId: LIFF_ID }).then(function() {
  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: "https://weekly-shot.vercel.app/diary.html" });
    return;
  }

  liff.getProfile().then(function(profile) {
    state.userId = profile.userId;
    state.displayName = profile.displayName;
    var nameEl = document.getElementById("user-name");
    nameEl.textContent = profile.displayName + " さん";
    nameEl.classList.remove("hidden");

    return fetch("/api/weight", {
      headers: { "X-Line-UserId": profile.userId }
    });
  }).then(function(r){ return r.json(); }).then(function(data) {
    state.logs = data.logs || [];
    renderData();
    show("main-view");
  }).catch(function(err) {
    show("main-view");
  });

}).catch(function(err) {
  showError("LIFF初期化エラー: " + (err.code||"") + " " + (err.message||err));
});

function renderData() {
  if (state.logs.length === 0) return;

  // 変化量カード
  var first = state.logs[0];
  var last = state.logs[state.logs.length - 1];
  var diff = (last.weight - first.weight).toFixed(1);
  var card = document.getElementById("change-card");
  var val = document.getElementById("change-value");
  var sub = document.getElementById("change-sub");

  var prefix = diff > 0 ? "+" : "";
  val.textContent = prefix + diff + "kg";
  val.className = "change-value " + (diff < 0 ? "loss" : diff > 0 ? "gain" : "neutral");
  sub.textContent = "開始時 " + first.weight + "kg → 現在 " + last.weight + "kg（" + state.logs.length + "日分）";
  card.classList.remove("hidden");

  // 今日の値をフォームに表示
  var today = new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Tokyo" });
  var todayLog = state.logs.find(function(l){ return l.recorded_date === today; });
  if (todayLog) {
    document.getElementById("weight-input").value = todayLog.weight;
    if (todayLog.body_fat) document.getElementById("fat-input").value = todayLog.body_fat;
    document.getElementById("submit-btn").textContent = "更新する";
  }

  // グラフ
  renderChart();

  // 履歴
  renderHistory();
}

function renderChart() {
  var logs = getFilteredLogs();
  if (logs.length < 2) {
    document.getElementById("chart-section").classList.add("hidden");
    return;
  }

  document.getElementById("chart-section").classList.remove("hidden");

  var labels = logs.map(function(l) {
    var d = new Date(l.recorded_date + "T00:00:00");
    return (d.getMonth()+1) + "/" + d.getDate();
  });
  var weights = logs.map(function(l){ return l.weight; });

  var datasets = [{
    label: "体重 (kg)",
    data: weights,
    borderColor: "#2563eb",
    backgroundColor: "rgba(37,99,235,.1)",
    fill: true,
    tension: 0.3,
    pointRadius: 3,
    pointBackgroundColor: "#2563eb"
  }];

  // 体脂肪データがあれば追加
  var fats = logs.map(function(l){ return l.body_fat; });
  var hasFat = fats.some(function(f){ return f !== null; });
  if (hasFat) {
    datasets.push({
      label: "体脂肪率 (%)",
      data: fats,
      borderColor: "#f59e0b",
      backgroundColor: "rgba(245,158,11,.1)",
      fill: false,
      tension: 0.3,
      pointRadius: 3,
      pointBackgroundColor: "#f59e0b",
      yAxisID: "y1"
    });
  }

  if (chart) chart.destroy();

  var ctx = document.getElementById("weight-chart").getContext("2d");
  var scales = {
    x: { ticks: { font: { size: 10 }, maxTicksLimit: 8 } },
    y: {
      position: "left",
      ticks: { font: { size: 10 } },
      title: { display: true, text: "kg", font: { size: 10 } }
    }
  };

  if (hasFat) {
    scales.y1 = {
      position: "right",
      grid: { drawOnChartArea: false },
      ticks: { font: { size: 10 } },
      title: { display: true, text: "%", font: { size: 10 } }
    };
  }

  chart = new Chart(ctx, {
    type: "line",
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      plugins: { legend: { display: hasFat, labels: { font: { size: 11 } } } },
      scales: scales
    }
  });
}

function getFilteredLogs() {
  if (currentRange === "all") return state.logs;
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  var cutoffStr = cutoff.toLocaleDateString("en-CA", { timeZone: "Asia/Tokyo" });
  return state.logs.filter(function(l){ return l.recorded_date >= cutoffStr; });
}

function setRange(range) {
  currentRange = range;
  document.getElementById("btn-30d").classList.toggle("active", range === "30d");
  document.getElementById("btn-all").classList.toggle("active", range === "all");
  renderChart();
}

function renderHistory() {
  var recent = state.logs.slice(-7).reverse();
  if (recent.length === 0) return;

  var WEEKDAYS = ["日","月","火","水","木","金","土"];
  var section = document.getElementById("history-section");
  var list = document.getElementById("history-list");
  list.innerHTML = "";

  recent.forEach(function(log) {
    var d = new Date(log.recorded_date + "T00:00:00");
    var dateStr = (d.getMonth()+1) + "/" + d.getDate() + "(" + WEEKDAYS[d.getDay()] + ")";
    var item = document.createElement("div");
    item.className = "history-item";
    var fatStr = log.body_fat ? '<span class="history-fat">' + log.body_fat + '%</span>' : '';
    item.innerHTML = '<span class="history-date">' + dateStr + '</span><span><span class="history-weight">' + log.weight + 'kg</span>' + fatStr + '</span>';
    list.appendChild(item);
  });

  section.classList.remove("hidden");
}

function handleSubmit() {
  var weight = parseFloat(document.getElementById("weight-input").value);
  var fat = parseFloat(document.getElementById("fat-input").value);

  if (!weight || weight < 20 || weight > 300) {
    var errEl = document.getElementById("api-error");
    errEl.textContent = "体重を正しく入力してください（20〜300kg）";
    errEl.classList.remove("hidden");
    return;
  }

  var btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "記録中...";
  document.getElementById("api-error").classList.add("hidden");
  document.getElementById("api-success").classList.add("hidden");

  var payload = {
    line_user_id: state.userId,
    weight: weight
  };
  if (!isNaN(fat) && fat > 0) payload.body_fat = fat;

  fetch("/api/weight", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (data.ok) {
      var successEl = document.getElementById("api-success");
      successEl.textContent = "記録しました！";
      successEl.classList.remove("hidden");

      // データ再取得
      return fetch("/api/weight", {
        headers: { "X-Line-UserId": state.userId }
      }).then(function(r){ return r.json(); }).then(function(d) {
        state.logs = d.logs || [];
        renderData();
      });
    } else {
      var errEl = document.getElementById("api-error");
      errEl.textContent = data.error || "記録に失敗しました";
      errEl.classList.remove("hidden");
    }
  }).catch(function(err) {
    var errEl = document.getElementById("api-error");
    errEl.textContent = err.message || "エラーが発生しました";
    errEl.classList.remove("hidden");
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = "記録する";
  });
}
</script>
</body>
</html>
